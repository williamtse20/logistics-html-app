<!-- Tailwind CSS：版面與工具類 -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- MapLibre GL：免金鑰向量地圖引擎 -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<!-- Deck.gl Standalone：3D 渲染（ArcLayer / ScatterplotLayer / MapboxOverlay 橋接） -->
<script src="https://unpkg.com/deck.gl@9.0.27/dist.min.js"></script>
<!-- Lucide Icons：圖標庫 -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- 字體：Orbitron(科技數字) + Noto Sans(CJK) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ====== 全域基礎 ====== */
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family:'Noto Sans TC','Noto Sans JP',system-ui,sans-serif; }
  #map { position:absolute; inset:0; width:100%; height:100%; }
  .tech-num { font-family:'Orbitron',monospace; letter-spacing:0.5px; }

  /* ====== 主題 CSS 變數（4 款主題） ======
     透過 body[data-theme] 切換，所有玻璃面板讀取這些變數 */
  :root{
    --glass-bg: rgba(8,15,30,0.72);
    --glass-bg-strong: rgba(8,15,30,0.92);
    --border: rgba(34,211,238,0.28);
    --accent: #22d3ee;
    --accent2: #ec4899;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --blur: 16px;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
  }
  /* 1) 影視暗黑科幻（預設） */
  body[data-theme="cinematic"]{
    --glass-bg: rgba(8,15,30,0.72); --glass-bg-strong: rgba(6,12,26,0.94);
    --border: rgba(34,211,238,0.28); --accent:#22d3ee; --accent2:#ec4899;
    --text:#e2e8f0; --muted:#94a3b8; --blur:16px; --radius:14px;
  }
  /* 2) Aurora 極光紫 */
  body[data-theme="aurora"]{
    --glass-bg: rgba(24,12,46,0.66); --glass-bg-strong: rgba(20,8,40,0.92);
    --border: rgba(168,85,247,0.35); --accent:#a855f7; --accent2:#22d3ee;
    --text:#f3e8ff; --muted:#c4b5fd; --blur:18px; --radius:18px;
  }
  /* 3) Apple iOS 26 液態玻璃 */
  body[data-theme="liquid"]{
    --glass-bg: rgba(255,255,255,0.55); --glass-bg-strong: rgba(255,255,255,0.78);
    --border: rgba(255,255,255,0.65); --accent:#0a84ff; --accent2:#ff375f;
    --text:#1d1d1f; --muted:#6e6e73; --blur:30px; --radius:22px;
    --shadow: 0 10px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  /* 4) Konica Minolta 官網企業風 */
  body[data-theme="konica"]{
    --glass-bg: rgba(255,255,255,0.92); --glass-bg-strong: rgba(255,255,255,0.97);
    --border: rgba(0,91,172,0.22); --accent:#005bac; --accent2:#e60012;
    --text:#1a1a1a; --muted:#5a6473; --blur:8px; --radius:8px;
    --shadow: 0 6px 24px rgba(0,40,90,0.14);
  }

  /* ====== 玻璃面板與通用元件 ====== */
  .glass{
    background: var(--glass-bg);
    border:1px solid var(--border);
    backdrop-filter: blur(var(--blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    color: var(--text);
  }
  .glass-strong{ background: var(--glass-bg-strong); }
  .txt{ color:var(--text); }
  .muted{ color:var(--muted); }
  .accent-text{ color:var(--accent); }
  .accent-bg{ background:var(--accent); }
  .accent-border{ border-color:var(--accent); }

  .chip{
    border:1px solid var(--border); color:var(--muted);
    border-radius:999px; transition:all .18s ease; cursor:pointer;
    background:transparent;
  }
  .chip:hover{ color:var(--text); border-color:var(--accent); }
  .chip.active{
    background:var(--accent); color:#fff; border-color:var(--accent);
    box-shadow:0 0 14px -2px var(--accent);
  }
  body[data-theme="liquid"] .chip.active,
  body[data-theme="konica"] .chip.active{ color:#fff; }

  .btn{
    border:1px solid var(--border); color:var(--text);
    border-radius:var(--radius); transition:all .18s ease; cursor:pointer;
    background:var(--glass-bg);
  }
  .btn:hover{ border-color:var(--accent); color:var(--accent); }

  /* 下拉選單樣式 */
  select.glass-select {
    background: var(--glass-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right .7rem top 50%;
    background-size: .65rem auto;
  }
  select[multiple].glass-select {
    background-image: none;
    padding-right: 8px;
  }
  select.glass-select option {
    background: #1e293b;
    color: #e2e8f0;
  }
  body[data-theme="liquid"] select.glass-select option,
  body[data-theme="konica"] select.glass-select option {
    background: #ffffff;
    color: #1a1a1a;
  }

  /* 上傳拖放區 */
  .dropzone{
    border:2px dashed var(--border); border-radius:var(--radius);
    transition:all .2s ease; cursor:pointer;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--accent);
    background:color-mix(in srgb, var(--accent) 12%, transparent);
  }

  /* 列表項目 */
  .list-item{
    border:1px solid transparent; border-left:3px solid var(--accent);
    border-radius:10px; transition:all .15s ease; cursor:pointer;
    background:color-mix(in srgb, var(--text) 5%, transparent);
  }
  .list-item:hover{ background:color-mix(in srgb, var(--accent) 14%, transparent); }
  .list-item.sel{
    background:color-mix(in srgb, var(--accent) 22%, transparent);
    border-color:var(--accent);
  }

  /* 捲軸美化 */
  .scroll::-webkit-scrollbar{ width:6px; }
  .scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }
  .scroll::-webkit-scrollbar-track{ background:transparent; }

  /* 右側詳情面板滑入 */
  .drill{ transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .3s; }
  .drill.hidden-panel{ transform:translateX(120%); opacity:0; pointer-events:none; }

  /* 左側面板收合（手機） */
  .sidebar{ transition:transform .35s cubic-bezier(.16,1,.3,1); }
  .sidebar.collapsed{ transform:translateX(-115%); }

  /* KPI 卡微光動畫 */
  @keyframes glowPulse{ 0%,100%{opacity:.5} 50%{opacity:1} }
  .pulse-dot{ animation:glowPulse 2s ease-in-out infinite; }

  /* 成功提示 Toast */
  .toast{ transition:all .4s cubic-bezier(.16,1,.3,1); }
  .toast.hide{ transform:translateY(-20px); opacity:0; pointer-events:none; }

  /* MapLibre logo 控制（淡化） */
  .maplibregl-ctrl-attrib{ opacity:.5; font-size:9px; }
</style>
</head>

let LANG = "zh";
let THEME = "cinematic";
let FILTER = { from:"all", to:"all", soldTo:"all", shipTo:"all", transCd:"all", etd:["all"], etdMonth:["all"], status:"all" };

let animTime = 0;
let deckOverlay = null;
let map = null;
let currentStyle = "";

const THEME_BASEMAP = {
  cinematic:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  aurora:   "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  liquid:   "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  konica:   "https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json",
};

/* =================================================================================
   ★★★ 第四區：輔助函數 ★★★
   ================================================================================= */
const t = (key) => (I18N[LANG][key] ?? key);
const clamp = (v,min,max)=> Math.max(min, Math.min(max, v));
const fmt = (n)=> Number(n||0).toLocaleString("en-US");
const fmtVol = (n)=> Number(n||0).toLocaleString("en-US",{maximumFractionDigits:2});

function locName(key){ return key; }

function arcColor(s){
  if(s.status==="Delayed") return [239,68,68];
  if(s.type==="air")  return [236,72,153];
  if(s.type==="sea")  return [34,211,238];
  return [34,197,94];
}

function arcHeight(type){
  return type==="air" ? 0.85 : type==="sea" ? 0.22 : 0.15;
}

function buildSeaPath(from, to){
  const dx = to[0]-from[0], dy = to[1]-from[1];
  const dist = Math.hypot(dx, dy);
  const mid = [(from[0]+to[0])/2, (from[1]+to[1])/2];
  const bend = clamp(dist*0.28, 1.2, 9);
  const ctrl = [ mid[0] + dx*0.05, mid[1] - bend ];
  const pts = [];
  for(let i=0;i<=24;i++){
    const tt = i/24;
    const x = (1-tt)*(1-tt)*from[0] + 2*(1-tt)*tt*ctrl[0] + tt*tt*to[0];
    const y = (1-tt)*(1-tt)*from[1] + 2*(1-tt)*tt*ctrl[1] + tt*tt*to[1];
    pts.push([x,y]);
  }
  return pts;
}

function prepareData(){
  SHIPMENTS.forEach(s=>{
    const from = COORDS[s.from], to = COORDS[s.to];
    if(!from || !to){ s.path = null; return; }
    s.path = (s.type==="sea") ? buildSeaPath(from,to) : [from, to];
    if(s._offset===undefined) s._offset = Math.random();
  });
}

function interpolate(path, p){
  if(!path) return [0,0];
  if(path.length===2){
    return [ path[0][0]+(path[1][0]-path[0][0])*p,
             path[0][1]+(path[1][1]-path[0][1])*p ];
  }
  const seg = p*(path.length-1);
  const i = Math.min(Math.floor(seg), path.length-2);
  const f = seg - i;
  const a = path[i], b = path[i+1];
  return [ a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f ];
}

function getFiltered(){
  return SHIPMENTS.filter(s=>{
    if(!s.path) return false;
    if(FILTER.from!=="all" && s.from!==FILTER.from) return false;
    if(FILTER.to!=="all" && s.to!==FILTER.to) return false;
    if(FILTER.soldTo!=="all" && s.soldTo!==FILTER.soldTo) return false;
    if(FILTER.shipTo!=="all" && s.shipTo!==FILTER.shipTo) return false;
    if(FILTER.transCd!=="all" && s.transCd!==FILTER.transCd) return false;
    
    if(FILTER.etdMonth && !FILTER.etdMonth.includes("all") && FILTER.etdMonth.length > 0){
        if(!FILTER.etdMonth.includes(s.etdMonth)) return false;
    }

    if(FILTER.etd && !FILTER.etd.includes("all") && FILTER.etd.length > 0){
        const etd = (s.etd||"").slice(0,10);
        const match = FILTER.etd.some(v => etd.startsWith(v));
        if(!match) return false;
    }

    if(FILTER.status!=="all" && s.status!==FILTER.status) return false;
    return true;
  });
}

/* =================================================================================
   ★★★ 第五區：地圖與 Deck.gl 圖層 ★★★
   ================================================================================= */
function initMap(){
  currentStyle = THEME_BASEMAP[THEME];
  map = new maplibregl.Map({
    container:"map",
    style: currentStyle,
    center:[114, 19],
    zoom:3.2, pitch:48, bearing:-8,
    attributionControl:{compact:true}
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:true}), "bottom-right");

  deckOverlay = new deck.MapboxOverlay({ interleaved:false, layers:[] });
  map.addControl(deckOverlay);

  map.on("load", ()=>{ updateLayers(); startAnim(); });
  map.on("style.load", ()=> updateLayers());
}

function updateLayers(){
  if(!deckOverlay) return;
  const data = getFiltered();

  const arcLayer = new deck.ArcLayer({
    id:"arc-layer", data, pickable:true, greatCircle:false,
    getSourcePosition: d=> COORDS[d.from],
    getTargetPosition: d=> COORDS[d.to],
    getSourceColor: d=> { const c=arcColor(d); return [...c, clamp(120+d.volume*5,120,255)]; },
    getTargetColor: d=> { const c=arcColor(d); return [...c, clamp(120+d.volume*5,120,255)]; },
    getHeight: d=> arcHeight(d.type),
    getWidth: d=> clamp(d.volume/5, 1.5, 8),
    widthMinPixels:1.5,
    updateTriggers:{ getWidth:[data], getSourceColor:[data] },
    onClick: info=>{ if(info.object) openDetail(info.object.id, true); }
  });

  const particles = data.map(s=>{
    const factor = s.type==="air" ? 0.0011 : s.type==="sea" ? 0.00030 : 0.00055;
    const phase = (animTime*factor + s._offset) % 1;
    return {
      id:s.id, type:s.type,
      position: interpolate(s.path, phase),
      color: arcColor(s),
      radius: clamp(s.volume/2, 4.5, 20)
    };
  });

  const glowLayer = new deck.ScatterplotLayer({
    id:"glow-layer", data:particles,
    getPosition:d=>d.position,
    getFillColor:d=>[...d.color, 70],
    getRadius:d=>d.radius*2.4,
    radiusUnits:"pixels", radiusMinPixels:6, radiusMaxPixels:60,
    updateTriggers:{ getPosition:[animTime] }
  });

  const coreLayer = new deck.ScatterplotLayer({
    id:"core-layer", data:particles, pickable:true,
    getPosition:d=>d.position,
    getFillColor:d=>[...d.color, 255],
    getLineColor:[255,255,255,220], lineWidthMinPixels:1, stroked:true,
    getRadius:d=>d.radius,
    radiusUnits:"pixels", radiusMinPixels:3, radiusMaxPixels:28,
    updateTriggers:{ getPosition:[animTime] },
    onClick: info=>{ if(info.object) openDetail(info.object.id, true); }
  });

  deckOverlay.setProps({ layers:[arcLayer, glowLayer, coreLayer] });
}

function startAnim(){
  function frame(){
    animTime += 1;
    updateLayers();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function renderKPI(){
  const data = getFiltered();
  const totalCost = data.reduce((a,s)=>a+(s.cost||0),0);
  const totalVol  = data.reduce((a,s)=>a+(s.volume||0),0);
  const viSet = new Set(data.map(s=>s.vi).filter(Boolean));
  document.getElementById("kpiCost").textContent  = fmt(totalCost);
  document.getElementById("kpiVol").textContent   = fmtVol(totalVol);
  document.getElementById("kpiVI").textContent    = viSet.size;
  document.getElementById("kpiBatch").textContent = data.length;
}

function populateDropdown(id, field, filterKey) {
  const select = document.getElementById(id);
  const currentVal = FILTER[filterKey];
  select.innerHTML = '';
  
  let uniqueVals = [];
  if(field === 'etd') {
      let etds = SHIPMENTS.map(s => (s[field]||"").slice(0,10)).filter(Boolean);
      uniqueVals = [...new Set(etds)].sort();
  } else {
      uniqueVals = [...new Set(SHIPMENTS.map(s => s[field]).filter(Boolean))].sort();
  }

  const optAll = document.createElement("option");
  optAll.value = "all";
  optAll.textContent = t("all");
  if (Array.isArray(currentVal) ? currentVal.includes("all") : currentVal === "all") {
      optAll.selected = true;
  }
  select.appendChild(optAll);

  uniqueVals.forEach(val => {
    const opt = document.createElement("option");
    opt.value = val;
    opt.textContent = val;
    if (Array.isArray(currentVal) ? currentVal.includes(val) : val === currentVal) {
        opt.selected = true;
    }
    select.appendChild(opt);
  });
  
  select.onchange = (e) => {
    if (select.multiple) {
        const selected = Array.from(e.target.selectedOptions).map(o => o.value);
        FILTER[filterKey] = selected.length ? selected : ["all"];
    } else {
        FILTER[filterKey] = e.target.value;
    }
    refresh();
  };
}

function renderFilters(){
  populateDropdown("filter-from", "from", "from");
  populateDropdown("filter-to", "to", "to");
  populateDropdown("filter-soldTo", "soldTo", "soldTo");
  populateDropdown("filter-shipTo", "shipTo", "shipTo");
  populateDropdown("filter-transCd", "transCd", "transCd");
  populateDropdown("filter-etdMonth", "etdMonth", "etdMonth");
  populateDropdown("filter-etd", "etd", "etd");
  populateDropdown("filter-status", "status", "status");
}

function openDetail(id, fly){
  selectedId = id;
  const panel = document.getElementById("drill");
  panel.classList.remove("hidden-panel");
  renderDetail();
  renderList();
  if(fly){
    const s = SHIPMENTS.find(x=>x.id===id);
    if(s && s.path){
      const factor = s.type==="air"?0.0011:s.type==="sea"?0.00030:0.00055;
      const phase = (animTime*factor + s._offset) % 1;
      const pos = interpolate(s.path, phase);
      map.easeTo({ center:pos, zoom:5.2, pitch:55, duration:1600, essential:true });
    }
  }
}

function refresh(){
  renderKPI();
  renderFilters();
  renderList();
  updateLayers();
  lucide.createIcons();
}

/* =================================================================================
   ★★★ 第七區：CSV 解析引擎 ★★★
   ================================================================================= */

function parseCSVLine(line){
  const res=[]; let cur=""; let q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(q && line[i+1]==='"'){ cur+='"'; i++; }
      else q=!q;
    } else if(ch===',' && !q){ res.push(cur); cur=""; }
    else cur+=ch;
  }
  res.push(cur);
  return res.map(x=>x.trim());
}

function detectField(header){
  const h = header.toLowerCase();
  const has = (...keys)=> keys.some(k=> h.includes(k.toLowerCase()));
  
  if(has("sold-to","soldto")) return "soldTo";
  if(has("ship-to","shipto")) return "shipTo";
  if(has("from","起點")) return "from";
  if(has("to","終點")) return "to";
  if(has("trans.cd","transcd","type","運輸方式")) return "transCd";
  if(has("etd 月份", "etd月份", "etd month")) return "etdMonth";
  if(has("etd")) return "etd";
  if(has("eta")) return "eta";
  if(has("status","狀態")) return "status";
  if(has("volume","cbm","貨量")) return "volume";
  if(has("vanning","vi","instruction")) return "vi";
  if(has("container no","container")) return "carrier";
  if(has("size of container","size")) return "ctype";
  
  return null;
}

function normType(v){
  const s=(v||"").toLowerCase();
  if(s.includes("air")) return "air";
  if(s.includes("sf") || s.includes("sea")) return "sea";
  return "land"; // TR or others
}

function normStatus(v){
  const s=(v||"").toLowerCase();
  if(s.includes("delay")||s.includes("延")||s.includes("遅")) return "Delayed";
  return "On Time";
}

function matchLocation(v){
  if(!v) return null;
  const val=v.trim().toUpperCase();
  if(COORDS[val]) return val;
  const keys=Object.keys(COORDS);
  let k=keys.find(x=>x.replace(/\s/g,"")===val.replace(/\s/g,""));
  if(k) return k;
  k=keys.find(x=> x.includes(val)||val.includes(x));
  return k||val; // Fallback to raw value if not found, map might not show it but data will exist
}

function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const lines = text.replace(/\r/g,"").split("\n").filter(l=>l.trim().length>0);
  if(lines.length<2) throw new Error("empty");

  const headers = parseCSVLine(lines[0]);
  const fieldIdx = {};
  headers.forEach((h,i)=>{ const f=detectField(h); if(f && fieldIdx[f]===undefined) fieldIdx[f]=i; });
  if(fieldIdx.from===undefined || fieldIdx.to===undefined) throw new Error("no from/to");

  const out=[];
  for(let r=1;r<lines.length;r++){
    const cols = parseCSVLine(lines[r]);
    const get=(f)=> fieldIdx[f]!==undefined ? (cols[fieldIdx[f]]||"") : "";
    
    const rawFrom = get("from");
    const rawTo = get("to");
    if(!rawFrom || !rawTo) continue;
    
    const from = matchLocation(rawFrom);
    const to   = matchLocation(rawTo);
    
    // Add missing coordinates dynamically if possible, else skip map drawing for them
    if(!COORDS[from]) COORDS[from] = [114, 22]; // Default fallback
    if(!COORDS[to]) COORDS[to] = [114, 22];

    out.push({
      id: r,
      from, to,
      soldTo: get("soldTo") || "-",
      shipTo: get("shipTo") || "-",
      transCd: get("transCd") || "-",
      carrier: get("carrier") || `BATCH-${r}`,
      type: normType(get("transCd")),
      ctype: get("ctype") || "-",
      volume: parseFloat((get("volume")||"0").replace(/[^\d.]/g,""))||0,
      vi: get("vi") || "-",
      cost: 0,
      etd: get("etd"), eta: get("eta"),
      etdMonth: get("etdMonth") || "-",
      status: normStatus(get("status")),
      _offset: Math.random()
    });
  }
  if(out.length===0) throw new Error("no valid rows");
  return out;
}

function handleFile(file){
  if(!file || !/\.csv$/i.test(file.name)){ showToast(t("uploadFail"), false); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const arr = parseCSV(e.target.result);
      SHIPMENTS = arr;
      selectedId = null;
      FILTER = { from:"all", to:"all", soldTo:"all", shipTo:"all", transCd:"all", etd:["all"], etdMonth:["all"], status:"all" };
      document.getElementById("drill").classList.add("hidden-panel");
      prepareData();
      refresh();
      showToast(t("uploadSuccess").replace("{n}", arr.length), true);
    }catch(err){
      showToast(t("uploadFail"), false);
      console.error(err);
    }
  };
  reader.readAsText(file, "UTF-8");
}

function downloadTemplate(){
  const tpl =
`FROM,TO,Sold-to,Ship-to,Vanning instruction no,Volume,Trans.cd,Size of Container,Container no,BillOfLad1,BillOfLad2,ETD,ETA,STATUS,ETD 月份
HONG KONG,HONG KONG,S7160,S7160002,VI-25-70753,4.72,TR,,,VI-25-70753,,2025-05-26 00:00:00,2025-05-17 00:00:00,normal,2025 5
HONG KONG,NAGOYA,S2000,S2000001,VI-25-80157,0.076,Air,,,YHK05778172,160HKG95243875,2025-06-04 00:00:00,2025-06-04 00:00:00,normal,2025 6
HONG KONG,HOCHIMINH,S9430,S9430,VI-25-70832-3,7.175,SF,40HQ,CMAU4732616,HKG1202826,,2025-06-07 00:00:00,2025-06-11 00:00:00,normal,2025 6`;
  const blob = new Blob(["\uFEFF"+tpl], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "BMHK_Template.csv";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function showToast(msg, ok){
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  toast.style.borderColor = ok ? "rgba(34,197,94,.6)" : "rgba(239,68,68,.6)";
  toast.querySelector("i").setAttribute("data-lucide", ok?"check-circle-2":"alert-triangle");
  toast.querySelector("i").style.color = ok ? "#22c55e" : "#ef4444";
  lucide.createIcons();
  toast.classList.remove("hide");
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> toast.classList.add("hide"), 3200);
}

/* =================================================================================
   ★★★ 第八區：主題 / 語言切換 ★★★
   ================================================================================= */
function setTheme(name){
  THEME = name;
  document.body.dataset.theme = name;
  document.querySelectorAll("[data-theme-btn]").forEach(b=>
    b.classList.toggle("active", b.dataset.themeBtn===name));
  const styleUrl = THEME_BASEMAP[name];
  if(styleUrl !== currentStyle){
    currentStyle = styleUrl;
    map.setStyle(styleUrl);
  }
}

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-lang-btn]").forEach(b=>
    b.classList.toggle("active", b.dataset.langBtn===LANG));
  refresh();
  renderDetail();
}

function setLang(l){ LANG=l; applyI18n(); }

/* =================================================================================
   ★★★ 第九區：事件綁定與啟動 ★★★
   ================================================================================= */
function bindEvents(){
  document.querySelectorAll("[data-theme-btn]").forEach(b=>
    b.onclick = ()=> setTheme(b.dataset.themeBtn));
  document.querySelectorAll("[data-lang-btn]").forEach(b=>
    b.onclick = ()=> setLang(b.dataset.langBtn));

  const dz = document.getElementById("dropzone");
  const fi = document.getElementById("fileInput");
  dz.onclick = ()=> fi.click();
  fi.onchange = (e)=>{ if(e.target.files[0]) handleFile(e.target.files[0]); };
  ["dragenter","dragover"].forEach(ev=> dz.addEventListener(ev, e=>{
    e.preventDefault(); e.stopPropagation(); dz.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev=> dz.addEventListener(ev, e=>{
    e.preventDefault(); e.stopPropagation(); dz.classList.remove("drag"); }));
  dz.addEventListener("drop", e=>{
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

  document.getElementById("tplBtn").onclick = downloadTemplate;

  document.getElementById("closeDrill").onclick = ()=>{
    selectedId=null;
    document.getElementById("drill").classList.add("hidden-panel");
    renderList();
  };

  const sidebar = document.getElementById("sidebar");
  const toggle = document.getElementById("toggleSidebar");
  function checkMobile(){
    if(window.innerWidth < 640){
      toggle.style.display="block";
    } else {
      toggle.style.display="none";
      sidebar.classList.remove("collapsed");
    }
  }
  toggle.onclick = ()=> sidebar.classList.toggle("collapsed");
  window.addEventListener("resize", checkMobile);
  checkMobile();
}

/* ====== 啟動 ====== */
window.addEventListener("DOMContentLoaded", ()=>{
  prepareData();
  initMap();
  bindEvents();
  applyI18n();
  lucide.createIcons();
});
</script>
